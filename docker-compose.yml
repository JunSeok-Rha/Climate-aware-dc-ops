services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dcops
      POSTGRES_USER: dcops
      POSTGRES_PASSWORD: dcops_local
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dc-ops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcops -d dcops"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dcops
      SPRING_DATASOURCE_USERNAME: dcops
      SPRING_DATASOURCE_PASSWORD: dcops_local
    ports:
      - "8080:8080"
    networks:
      - dc-ops-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    profiles:
      - proxy
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dc-ops-net

volumes:
  pgdata:

networks:
  dc-ops-net:
    driver: bridge
